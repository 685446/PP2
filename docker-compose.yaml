services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sportsdeck
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d sportsdeck"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "60", "1", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data


  app:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    ports:
      - "3000:3000"
    volumes:
      - avatar-uploads:/app/public/uploads/avatars
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/sportsdeck
      REDIS_URL: redis://redis:6379
      NODE_ENV: production
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      seeder:
        condition: service_completed_successfully

  seeder:
    build:
      context: .
      dockerfile: Dockerfile.seed
    working_dir: /app
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/sportsdeck
    depends_on:
      db:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    depends_on:
      - app
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - avatar-uploads:/usr/share/nginx/html/uploads/avatars:ro

volumes:
  postgres-data:
  redis-data:
  avatar-uploads:
